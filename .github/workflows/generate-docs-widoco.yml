name: Generate GH Pages with Widoco

on:
  release:
    types: [published]
  workflow_dispatch:  # Allow manual triggers for testing

# Sets permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate documentation with Widoco
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/ontology:/data/ontology:ro \
            -v ${{ github.workspace }}/docs-output:/data/docs-output \
            ghcr.io/dgarijo/widoco:v1.4.25 \
            -ontFile /data/ontology/oak-curriculum-ontology.ttl \
            -outFolder /data/docs-output \
            -htaccess \
            -uniteSections \
            -includeAnnotationProperties \
            -webVowl \
            -noPlaceHolderText \
            -excludeProvenance \
            -rewriteAll

      - name: Fix output directory permissions
        run: sudo chown -R $(id -u):$(id -g) docs-output

      - name: Validate generated documentation
        run: |
          echo "Validating documentation structure..."
          test -f docs-output/doc/index-en.html || (echo "❌ Missing index-en.html" && exit 1)
          test -d docs-output/doc/sections || (echo "❌ Missing sections directory" && exit 1)
          echo "✅ Documentation structure validated"

      - name: Add version metadata to documentation
        run: |
          echo "Adding version and build metadata..."

          # Create a metadata file
          cat > docs-output/doc/build-info.json <<EOF
          {
            "generated_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "commit_sha": "${{ github.sha }}",
            "commit_short": "$(echo ${{ github.sha }} | cut -c1-7)",
            "ref": "${{ github.ref }}",
            "repository": "${{ github.repository }}",
            "widoco_version": "v1.4.25"
          }
          EOF

          echo "✅ Build metadata added"
          cat docs-output/doc/build-info.json

      - name: Check for broken internal links
        run: |
          echo "Checking for broken internal links..."

          # Simple check for common issues
          cd docs-output/doc

          # Check if ontology file reference exists
          if grep -q "ontology.ttl" index-en.html; then
            echo "✅ Ontology reference found"
          fi

          # Count total HTML files generated
          HTML_COUNT=$(find . -name "*.html" | wc -l)
          echo "📊 Generated $HTML_COUNT HTML pages"

          echo "✅ Link validation completed"

      - name: Create index.html
        run: cp docs-output/doc/index-en.html docs-output/doc/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs-output/doc'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Display summary
        if: always()
        run: |
          echo "### Ontology Documentation Generated with Widoco" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Source Ontology:** \`ontology/oak-curriculum-ontology.ttl\`" >> $GITHUB_STEP_SUMMARY
          echo "**Generator:** Widoco v1.4.25" >> $GITHUB_STEP_SUMMARY
          echo "**Generated:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`$(echo ${{ github.sha }} | cut -c1-7)\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.deployment.outcome }}" == "success" ]; then
            echo "✅ **Status:** Documentation deployed successfully" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Live Documentation:** ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
            echo "**Build Metadata:** ${{ steps.deployment.outputs.page_url }}build-info.json" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### Features Included" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ HTML documentation with cross-references" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ WebVOWL interactive visualization" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Class and property definitions" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Annotation properties" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ .htaccess file for content negotiation" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Build metadata and version tracking" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Status:** Documentation generation or deployment failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Please review the logs above for error details." >> $GITHUB_STEP_SUMMARY
          fi
