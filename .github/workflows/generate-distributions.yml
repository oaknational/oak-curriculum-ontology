name: Generate Static Distribution Files

on:
  workflow_dispatch:  # Manual trigger via GitHub UI
  release:
    types: [ published ]

# Explicit permissions for security
permissions:
  contents: write  # Needed for release uploads

# Prevent duplicate runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JENA_VERSION: "6.1.0"

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Java 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Download and verify Apache Jena
        run: |
          echo "Downloading Apache Jena ${{ env.JENA_VERSION }}..."
          wget -q "https://dlcdn.apache.org/jena/binaries/apache-jena-${{ env.JENA_VERSION }}.tar.gz"
          wget -q "https://dlcdn.apache.org/jena/binaries/apache-jena-${{ env.JENA_VERSION }}.tar.gz.sha512"

          echo "Verifying checksum..."
          sha512sum -c "apache-jena-${{ env.JENA_VERSION }}.tar.gz.sha512"

          echo "Extracting..."
          tar xzf "apache-jena-${{ env.JENA_VERSION }}.tar.gz"

          echo "Cleaning up archive..."
          rm "apache-jena-${{ env.JENA_VERSION }}.tar.gz" "apache-jena-${{ env.JENA_VERSION }}.tar.gz.sha512"

      - name: Add Jena to PATH
        run: |
          echo "$PWD/apache-jena-${{ env.JENA_VERSION }}/bin" >> $GITHUB_PATH

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: '3.12'

      - name: Check version strings match the release tag
        if: github.event_name == 'release'
        run: |
          uv run python scripts/check_version_consistency.py --tag "${GITHUB_REF_NAME}"

      - name: Generate distribution files
        run: ./scripts/build_static_data.sh

      - name: Validate RDF outputs and count triples
        id: validate
        run: |
          echo "Validating generated RDF files..."
          echo ""
          FORMAT_COUNTS=""

          # Validate all formats in a single loop and count triples
          for ext in ttl jsonld rdf nt; do
            case $ext in
              ttl) FORMAT="Turtle" ;;
              jsonld) FORMAT="JSON-LD" ;;
              rdf) FORMAT="RDF/XML" ;;
              nt) FORMAT="N-Triples" ;;
            esac

            echo "Checking $FORMAT files (.$ext)..."
            for file in distributions/*.$ext; do
              if [ -f "$file" ]; then
                echo "  Validating $(basename $file)..."
                if riot --validate "$file"; then
                  echo "    ✅ Valid $FORMAT"

                  # Count triples for the main file
                  if [[ "$(basename $file)" == "oak-curriculum-full.$ext" ]]; then
                    TRIPLE_COUNT=$(riot --count "$file" 2>&1 | grep -i 'Triples' | grep -oP '[\d,]+' | tr -d ',' || echo "0")
                    echo "    📊 Triple count: $TRIPLE_COUNT"
                    FORMAT_COUNTS="$FORMAT_COUNTS $ext=$TRIPLE_COUNT"
                    echo "triple_count=$TRIPLE_COUNT" >> $GITHUB_OUTPUT
                  fi
                else
                  echo "    ❌ Invalid $FORMAT"
                  exit 1
                fi
              fi
            done
            echo ""
          done

          # Cross-format invariant: every serialization must contain the
          # same number of triples
          echo "Cross-format triple counts:$FORMAT_COUNTS"
          UNIQUE_COUNTS=$(echo "$FORMAT_COUNTS" | tr ' ' '\n' | cut -d= -f2 | grep . | sort -u | wc -l | tr -d ' ')
          if [ "$UNIQUE_COUNTS" -ne 1 ]; then
            echo "❌ Triple counts differ across formats:$FORMAT_COUNTS"
            exit 1
          fi

          echo "✅ All distribution files validated successfully!"

      - name: Validate Property Graph JSONL outputs
        run: |
          echo "Validating Property Graph JSONL files..."
          uv run python scripts/validate_pg_jsonl.py distributions
          echo ""
          echo "✅ JSONL distribution files validated successfully!"

      - name: Smoke test Property Graph JSONL outputs
        run: |
          echo "Smoke testing Property Graph JSONL files..."
          uv run python scripts/test_pg_jsonl.py distributions
          echo ""
          echo "✅ JSONL smoke test passed!"

      - name: Verify SQLite distribution integrity
        run: |
          uv run python - <<'EOF'
          import sqlite3
          con = sqlite3.connect("distributions/oak-curriculum.sqlite")
          assert con.execute("PRAGMA integrity_check").fetchone()[0] == "ok"
          tables = [r[0] for r in con.execute(
              "SELECT name FROM sqlite_master WHERE type='table'")]
          assert tables, "no tables in SQLite distribution"
          total = sum(con.execute(f'SELECT COUNT(*) FROM "{t}"').fetchone()[0]
                      for t in tables)
          print(f"SQLite OK: {len(tables)} tables, {total:,} rows")
          assert total > 0, "SQLite distribution is empty"
          EOF

      - name: Generate checksums, metadata and step summary
        run: |
          uv run python scripts/generate_distribution_summary.py \
            --triple-count ${{ steps.validate.outputs.triple_count }} \
            --commit-sha ${{ github.sha }} \
            --ref ${{ github.ref }}

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: oak-curriculum-distributions-${{ github.sha }}
          path: distributions/
          retention-days: 30

      - name: Upload files to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Uploading distribution files to release ${{ github.event.release.tag_name }}"
          gh release upload ${{ github.event.release.tag_name }} \
            distributions/oak-curriculum-full.ttl \
            distributions/oak-curriculum-full.jsonld \
            distributions/oak-curriculum-full.rdf \
            distributions/oak-curriculum-full.nt \
            distributions/checksums-sha256.txt \
            distributions/checksums-md5.txt \
            distributions/distribution-info.json \
            distributions/nodes.jsonl \
            distributions/relationships.jsonl \
            distributions/oak-curriculum.sqlite \
            distributions/oak-curriculum-schema-postgres.sql \
            distributions/oak-curriculum-schema-sqlite.sql \
            --clobber

