name: Generate Static Distribution Files

on:
  workflow_dispatch:  # Manual trigger via GitHub UI
  release:
    types: [ published ]

# Explicit permissions for security
permissions:
  contents: write  # Needed for release uploads

# Prevent duplicate runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JENA_VERSION: "6.0.0"

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Download and verify Apache Jena
        run: |
          echo "Downloading Apache Jena ${{ env.JENA_VERSION }}..."
          wget -q "https://dlcdn.apache.org/jena/binaries/apache-jena-${{ env.JENA_VERSION }}.tar.gz"
          wget -q "https://dlcdn.apache.org/jena/binaries/apache-jena-${{ env.JENA_VERSION }}.tar.gz.sha512"

          echo "Verifying checksum..."
          sha512sum -c "apache-jena-${{ env.JENA_VERSION }}.tar.gz.sha512"

          echo "Extracting..."
          tar xzf "apache-jena-${{ env.JENA_VERSION }}.tar.gz"

          echo "Cleaning up archive..."
          rm "apache-jena-${{ env.JENA_VERSION }}.tar.gz" "apache-jena-${{ env.JENA_VERSION }}.tar.gz.sha512"

      - name: Add Jena to PATH
        run: |
          echo "$PWD/apache-jena-${{ env.JENA_VERSION }}/bin" >> $GITHUB_PATH

      - name: Set up uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5
        with:
          python-version: '3.12'

      - name: Generate distribution files
        run: ./scripts/build_static_data.sh

      - name: Validate RDF outputs and count triples
        id: validate
        run: |
          echo "Validating generated RDF files..."
          echo ""

          # Validate all formats in a single loop and count triples
          for ext in ttl jsonld rdf nt; do
            case $ext in
              ttl) FORMAT="Turtle" ;;
              jsonld) FORMAT="JSON-LD" ;;
              rdf) FORMAT="RDF/XML" ;;
              nt) FORMAT="N-Triples" ;;
            esac

            echo "Checking $FORMAT files (.$ext)..."
            for file in distributions/*.$ext; do
              if [ -f "$file" ]; then
                echo "  Validating $(basename $file)..."
                if riot --validate "$file"; then
                  echo "    ✅ Valid $FORMAT"

                  # Count triples for the main file
                  if [[ "$(basename $file)" == "oak-curriculum-full.$ext" ]]; then
                    TRIPLE_COUNT=$(riot --count "$file" 2>&1 | grep -oP '\d+(?= triples)' || echo "0")
                    echo "    📊 Triple count: $TRIPLE_COUNT"
                    echo "triple_count=$TRIPLE_COUNT" >> $GITHUB_OUTPUT
                  fi
                else
                  echo "    ❌ Invalid $FORMAT"
                  exit 1
                fi
              fi
            done
            echo ""
          done

          echo "✅ All distribution files validated successfully!"

      - name: Validate Property Graph JSONL outputs
        run: |
          echo "Validating Property Graph JSONL files..."
          uv run python scripts/validate_pg_jsonl.py distributions
          echo ""
          echo "✅ JSONL distribution files validated successfully!"

      - name: Smoke test Property Graph JSONL outputs
        run: |
          echo "Smoke testing Property Graph JSONL files..."
          uv run python scripts/test_pg_jsonl.py distributions
          echo ""
          echo "✅ JSONL smoke test passed!"

      - name: Generate checksums
        run: |
          echo "Generating checksums for distribution files..."
          cd distributions

          # Generate SHA256 checksums
          sha256sum oak-curriculum-full.* > checksums-sha256.txt
          sha256sum nodes.jsonl relationships.jsonl >> checksums-sha256.txt
          sha256sum oak-curriculum.sqlite >> checksums-sha256.txt
          sha256sum oak-curriculum-schema-postgres.sql oak-curriculum-schema-sqlite.sql >> checksums-sha256.txt

          # Generate MD5 checksums (for compatibility)
          md5sum oak-curriculum-full.* > checksums-md5.txt
          md5sum nodes.jsonl relationships.jsonl >> checksums-md5.txt
          md5sum oak-curriculum.sqlite >> checksums-md5.txt
          md5sum oak-curriculum-schema-postgres.sql oak-curriculum-schema-sqlite.sql >> checksums-md5.txt

          echo ""
          echo "✅ Checksums generated:"
          echo ""
          cat checksums-sha256.txt

      - name: Create distribution metadata
        run: |
          echo "Creating distribution metadata..."

          cat > distributions/distribution-info.json <<EOF
          {
            "generated_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "commit_sha": "${{ github.sha }}",
            "commit_short": "$(echo ${{ github.sha }} | cut -c1-7)",
            "ref": "${{ github.ref }}",
            "triple_count": ${{ steps.validate.outputs.triple_count }},
            "formats": [
              {
                "format": "Turtle",
                "extension": ".ttl",
                "mime_type": "text/turtle"
              },
              {
                "format": "JSON-LD",
                "extension": ".jsonld",
                "mime_type": "application/ld+json"
              },
              {
                "format": "RDF/XML",
                "extension": ".rdf",
                "mime_type": "application/rdf+xml"
              },
              {
                "format": "N-Triples",
                "extension": ".nt",
                "mime_type": "application/n-triples"
              },
              {
                "format": "Property Graph Nodes (JSONL)",
                "filename": "nodes.jsonl",
                "mime_type": "application/x-ndjson"
              },
              {
                "format": "Property Graph Relationships (JSONL)",
                "filename": "relationships.jsonl",
                "mime_type": "application/x-ndjson"
              },
              {
                "format": "SQLite",
                "filename": "oak-curriculum.sqlite",
                "mime_type": "application/vnd.sqlite3"
              },
              {
                "format": "SQL Schema (PostgreSQL)",
                "filename": "oak-curriculum-schema-postgres.sql",
                "mime_type": "application/sql"
              },
              {
                "format": "SQL Schema (SQLite)",
                "filename": "oak-curriculum-schema-sqlite.sql",
                "mime_type": "application/sql"
              }
            ]
          }
          EOF

          echo "✅ Distribution metadata created"
          cat distributions/distribution-info.json

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oak-curriculum-distributions-${{ github.sha }}
          path: distributions/
          retention-days: 30

      - name: Upload files to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Uploading distribution files to release ${{ github.event.release.tag_name }}"
          gh release upload ${{ github.event.release.tag_name }} \
            distributions/oak-curriculum-full.ttl \
            distributions/oak-curriculum-full.jsonld \
            distributions/oak-curriculum-full.rdf \
            distributions/oak-curriculum-full.nt \
            distributions/checksums-sha256.txt \
            distributions/checksums-md5.txt \
            distributions/distribution-info.json \
            distributions/nodes.jsonl \
            distributions/relationships.jsonl \
            distributions/oak-curriculum.sqlite \
            distributions/oak-curriculum-schema-postgres.sql \
            distributions/oak-curriculum-schema-sqlite.sql \
            --clobber

      - name: Display summary
        run: |
          echo "### Generated RDF Distribution Files" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triple Count:** ${{ steps.validate.outputs.triple_count }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Format | File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|------|" >> $GITHUB_STEP_SUMMARY
          for file in distributions/oak-curriculum-full.*; do
            if [ -f "$file" ]; then
              SIZE=$(ls -lh "$file" | awk '{print $5}')
              BASENAME=$(basename "$file")
              EXT="${BASENAME##*.}"
              case $EXT in
                ttl) FORMAT="Turtle" ;;
                jsonld) FORMAT="JSON-LD" ;;
                rdf) FORMAT="RDF/XML" ;;
                nt) FORMAT="N-Triples" ;;
                *) continue ;;
              esac
              echo "| $FORMAT | \`$BASENAME\` | $SIZE |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          if [ -f "distributions/nodes.jsonl" ]; then
            SIZE=$(ls -lh distributions/nodes.jsonl | awk '{print $5}')
            echo "| Property Graph Nodes (JSONL) | \`nodes.jsonl\` | $SIZE |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f "distributions/relationships.jsonl" ]; then
            SIZE=$(ls -lh distributions/relationships.jsonl | awk '{print $5}')
            echo "| Property Graph Relationships (JSONL) | \`relationships.jsonl\` | $SIZE |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f "distributions/oak-curriculum.sqlite" ]; then
            SIZE=$(ls -lh distributions/oak-curriculum.sqlite | awk '{print $5}')
            echo "| SQLite | \`oak-curriculum.sqlite\` | $SIZE |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f "distributions/oak-curriculum-schema-postgres.sql" ]; then
            SIZE=$(ls -lh distributions/oak-curriculum-schema-postgres.sql | awk '{print $5}')
            echo "| SQL Schema (PostgreSQL) | \`oak-curriculum-schema-postgres.sql\` | $SIZE |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f "distributions/oak-curriculum-schema-sqlite.sql" ]; then
            SIZE=$(ls -lh distributions/oak-curriculum-schema-sqlite.sql | awk '{print $5}')
            echo "| SQL Schema (SQLite) | \`oak-curriculum-schema-sqlite.sql\` | $SIZE |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          TOTAL=$(du -sh distributions | cut -f1)
          echo "**Total size:** $TOTAL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Additional Files" >> $GITHUB_STEP_SUMMARY
          echo "- \`checksums-sha256.txt\` - SHA256 checksums for verification" >> $GITHUB_STEP_SUMMARY
          echo "- \`checksums-md5.txt\` - MD5 checksums for compatibility" >> $GITHUB_STEP_SUMMARY
          echo "- \`distribution-info.json\` - Metadata and build information" >> $GITHUB_STEP_SUMMARY
