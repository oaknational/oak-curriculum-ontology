name: Generate Static Distribution Files

on:
  workflow_dispatch:  # Manual trigger via GitHub UI
  release:
    types: [ published ]

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Apache Jena
        run: |
          wget -q https://dlcdn.apache.org/jena/binaries/apache-jena-6.0.0.tar.gz
          tar xzf apache-jena-6.0.0.tar.gz
          echo "$PWD/apache-jena-6.0.0/bin" >> $GITHUB_PATH

      - name: Generate distribution files
        run: ./scripts/build-static-data.sh

      - name: Validate RDF outputs
        run: |
          echo "Validating generated RDF files..."

          # Validate Turtle files
          echo "Checking Turtle files..."
          for file in distributions/*.ttl; do
            if [ -f "$file" ]; then
              echo "  Validating $file..."
              riot --validate "$file" && echo "    Valid Turtle"
            fi
          done

          # Validate JSON-LD files
          echo "Checking JSON-LD files..."
          for file in distributions/*.jsonld; do
            if [ -f "$file" ]; then
              echo "  Validating $file..."
              riot --validate "$file" && echo "    Valid JSON-LD"
            fi
          done

          # Validate RDF/XML files
          echo "Checking RDF/XML files..."
          for file in distributions/*.rdf; do
            if [ -f "$file" ]; then
              echo "  Validating $file..."
              riot --validate "$file" && echo "    Valid RDF/XML"
            fi
          done

          # Validate N-Triples files
          echo "Checking N-Triples files..."
          for file in distributions/*.nt; do
            if [ -f "$file" ]; then
              echo "  Validating $file..."
              riot --validate "$file" && echo "    Valid N-Triples"
            fi
          done

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oak-curriculum-distributions-${{ github.sha }}
          path: distributions/
          retention-days: 30

      - name: Upload files to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Uploading distribution files to release ${{ github.event.release.tag_name }}"
          gh release upload ${{ github.event.release.tag_name }} \
            distributions/oak-curriculum-full.ttl \
            distributions/oak-curriculum-full.jsonld \
            distributions/oak-curriculum-full.rdf \
            distributions/oak-curriculum-full.nt \
            --clobber

      - name: Display summary
        run: |
          echo "### Generated RDF Distribution Files" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Four RDF serialization formats for semantic web consumers:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Format | File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|------|" >> $GITHUB_STEP_SUMMARY
          for file in distributions/oak-curriculum-full.*; do
            SIZE=$(ls -lh "$file" | awk '{print $5}')
            BASENAME=$(basename "$file")
            EXT="${BASENAME##*.}"
            case $EXT in
              ttl) FORMAT="Turtle" ;;
              jsonld) FORMAT="JSON-LD" ;;
              rdf) FORMAT="RDF/XML" ;;
              nt) FORMAT="N-Triples" ;;
            esac
            echo "| $FORMAT | $BASENAME | $SIZE |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          TOTAL=$(du -sh distributions | cut -f1)
          echo "**Total size:** $TOTAL" >> $GITHUB_STEP_SUMMARY
