name: Validate Ontology

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**/*.ttl'
      - '.github/workflows/validate-ontology.yml'
      - 'scripts/merge_ttls_with_imports.py'
      - 'pyproject.toml'
  pull_request:
    branches: [ main ]
    paths:
      - '**/*.ttl'
      - '.github/workflows/validate-ontology.yml'
      - 'scripts/merge_ttls_with_imports.py'
      - 'pyproject.toml'
  workflow_dispatch:

# Explicit permissions for security
permissions:
  contents: read
  pull-requests: write

# Prevent duplicate runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-ontology:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']

    name: Validate (Python ${{ matrix.python-version }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          uv pip install --system rdflib pyshacl
      
      - name: Merge TTLs and resolve owl:imports (exclude "versions")
        run: |
          python scripts/merge_ttls_with_imports.py
        
      - name: Check Turtle syntax
        id: syntax-check
        run: |
          python - <<'EOF'
          from rdflib import Graph
          try:
              g = Graph()
              g.parse("/tmp/combined-data.ttl", format="turtle")
              print("✅ Merged Turtle syntax is valid")
          except Exception as e:
              print(f"❌ Turtle syntax error: {e}")
              exit(1)
          EOF

      - name: Run SHACL validation
        id: shacl-validation
        run: |
          echo "Running SHACL validation..."

          # Run SHACL validation and capture output
          if pyshacl \
            --shacl ontology/oak-curriculum-constraints.ttl \
            --ont-graph ontology/oak-curriculum-ontology.ttl \
            --inference rdfs \
            --abort \
            --format human \
            /tmp/combined-data.ttl > /tmp/shacl-output.txt 2>&1; then

            echo "✅ Validation passed"
            echo "conforms=true" >> $GITHUB_OUTPUT
            echo "violations=0" >> $GITHUB_OUTPUT
            cat /tmp/shacl-output.txt
          else
            echo "❌ Validation failed"
            echo "conforms=false" >> $GITHUB_OUTPUT

            # Count violations
            VIOLATIONS=$(grep -c "Constraint Violation" /tmp/shacl-output.txt || echo "0")
            echo "violations=$VIOLATIONS" >> $GITHUB_OUTPUT
            echo "Found $VIOLATIONS constraint violations"

            cat /tmp/shacl-output.txt
            exit 1
          fi

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shacl-validation-report-${{ github.sha }}
          path: /tmp/shacl-output.txt
          retention-days: 14

      - name: Display SHACL validation summary
        if: always()
        run: |
          echo "### SHACL Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Python Version:** ${{ matrix.python-version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Validates all curriculum data instances against the ontology schema:" >> $GITHUB_STEP_SUMMARY
          echo "- Required properties and cardinalities" >> $GITHUB_STEP_SUMMARY
          echo "- Property value types and patterns" >> $GITHUB_STEP_SUMMARY
          echo "- Relationships between entities" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.shacl-validation.outcome }}" == "success" ]; then
            echo "✅ **Result:** All curriculum data conforms to validation constraints" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Result:** Validation failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Violations Found:** ${{ steps.shacl-validation.outputs.violations }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📎 **Validation Report:** See uploaded artifact \`shacl-validation-report-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
