name: Validate Ontology

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**/*.ttl'
      - '.github/workflows/validate-ontology.yml'
      - 'scripts/merge_ttls_with_imports.py'
      - 'scripts/check_readme_examples.py'
      - 'README.md'
      - 'pyproject.toml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Explicit permissions for security
permissions:
  contents: read
  pull-requests: write

# Prevent duplicate runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-ontology:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Create virtual environment and install dependencies
        run: |
          uv sync
      
      # The merge parses every source file (syntax check) and emits
      # N-Triples, which pyshacl re-parses much faster than Turtle
      - name: Merge TTLs and resolve owl:imports (exclude "versions")
        run: |
          uv run python scripts/merge_ttls_with_imports.py -o /tmp/combined-data.nt

      - name: Run SHACL validation
        id: shacl-validation
        run: |
          echo "Running SHACL validation..."

          # Run SHACL validation and capture output
          # --inference none: entities carry explicit types and shapes target
          # concrete classes; RDFS inference dominated runtime and masked
          # genuine warnings. --abort keeps this fast but can truncate the
          # report at the first failing shape (see scripts/validate.sh)
          if uv run pyshacl \
            --shacl ontology/oak-curriculum-constraints.ttl \
            --ont-graph ontology/oak-curriculum-ontology.ttl \
            --inference none \
            --abort \
            --format human \
            /tmp/combined-data.nt > /tmp/shacl-output.txt 2>&1; then

            echo "✅ Validation passed"
            echo "conforms=true" >> $GITHUB_OUTPUT
            echo "violations=0" >> $GITHUB_OUTPUT
            cat /tmp/shacl-output.txt
          else
            # Count violations (grep -c always outputs the count; || true suppresses non-zero exit when count is 0)
            VIOLATIONS=$(grep -c "Constraint Violation" /tmp/shacl-output.txt || true)
            echo "violations=${VIOLATIONS}" >> $GITHUB_OUTPUT
            echo "Found ${VIOLATIONS} constraint violations"

            cat /tmp/shacl-output.txt

            # Only fail if there are actual violations; warnings alone are not failures
            if [ "${VIOLATIONS}" -gt 0 ]; then
              echo "conforms=false" >> $GITHUB_OUTPUT
              echo "❌ Validation failed"
              exit 1
            else
              echo "conforms=true" >> $GITHUB_OUTPUT
              echo "⚠️  Validation passed with warnings"
            fi
          fi

      - name: Check README examples and counts against the data
        run: |
          uv run python scripts/check_readme_examples.py

      - name: Check version strings agree across the repository
        run: |
          uv run python scripts/check_version_consistency.py

      - name: Run SPARQL query tests
        run: |
          uv run python scripts/test_sparql_queries.py

      - name: Generate and smoke-test property-graph JSONL
        run: |
          mkdir -p /tmp/pg-dist

          uv run python scripts/generate_pg_jsonl.py /tmp/combined-data.nt /tmp/pg-dist
          uv run python scripts/test_pg_jsonl.py /tmp/pg-dist

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: shacl-validation-report-${{ github.sha }}
          path: /tmp/shacl-output.txt
          retention-days: 30

      - name: Display SHACL validation summary
        if: always()
        run: |
          echo "### SHACL Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Python Version:** 3.12" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Validates all curriculum data instances against the ontology schema:" >> $GITHUB_STEP_SUMMARY
          echo "- Required properties and cardinalities" >> $GITHUB_STEP_SUMMARY
          echo "- Property value types and patterns" >> $GITHUB_STEP_SUMMARY
          echo "- Relationships between entities" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.shacl-validation.outcome }}" == "success" ]; then
            echo "✅ **Result:** All curriculum data conforms to validation constraints" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Result:** Validation failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Violations Found:** ${{ steps.shacl-validation.outputs.violations }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📎 **Validation Report:** See uploaded artifact \`shacl-validation-report-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
